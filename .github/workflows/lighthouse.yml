name: Lighthouse CI

on:
    workflow_run:
        workflows: ['Deploy']
        types:
            - completed

jobs:
    lighthouse:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Wait for private server deploy
              run: sleep 30

            - name: Run Lighthouse CI
              run: |
                  npm install -g @lhci/cli@0.13.x
                  lhci autorun --config=.lighthouserc.json --collect.url=https://daniel-tenzler.de
